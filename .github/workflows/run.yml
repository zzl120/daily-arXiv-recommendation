# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: arXiv-daily-ai-enhanced

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      date_from:
        description: '开始日期 (YYYY-MM-DD)'
        required: false
        default: '2026-02-20'
      date_to:
        description: '结束日期 (YYYY-MM-DD)'
        required: false
        default: '2026-03-04'


jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync
        
    - name: Crawl arXiv papers
      id: crawl_step
      run: |
        source .venv/bin/activate
        
        # 获取日期参数，如果没有则使用今天
        DATE_FROM="${{ github.event.inputs.date_from }}"
        DATE_TO="${{ github.event.inputs.date_to }}"

        if [ -z "$DATE_FROM" ]; then
            DATE_FROM=$(date -u "+%Y-%m-%d")
            DATE_TO="$DATE_FROM"
        fi
        
        echo "开始爬取 $DATE_FROM 到 $DATE_TO 的arXiv论文... / Starting to crawl $DATE_FROM to $DATE_TO arXiv papers..."
        
        # 遍历日期范围 / Iterate through date range
        current_date="$DATE_FROM"
        while [[ "$current_date" <= "$DATE_TO" ]]; do
            echo "爬取日期: $current_date ..."

            # 检查当日文件是否已存在，如存在则删除 / Check if file exists, delete if found
            if [ -f "data/${current_date}.jsonl" ]; then
                echo "🗑️ 发现文件已存在，正在删除重新生成... / Found existing file, deleting for fresh start..."
                rm "data/${current_date}.jsonl"
            fi
        
            cd daily_arxiv
            export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
            export TOKEN_GITHUB=${{ secrets.TOKEN_GITHUB }}
            export LANGUAGE="${{ vars.LANGUAGE }}"
            export CATEGORIES="${{ vars.CATEGORIES }}"
            export MODEL_NAME="${{ vars.MODEL_NAME }}"
            export KEYWORDS="${{ vars.KEYWORDS }}"
        
            echo "=== 调试信息 ==="
            echo "CATEGORIES: $CATEGORIES"
            echo "KEYWORDS: $KEYWORDS"
            echo "==============="
        
            # 使用Scrapy爬取指定日期
            scrapy crawl arxiv -o ../data/${current_date}.jsonl -a date_from=$current_date -a date_to=$current_date

            # 检查爬取是否成功 / Check if crawling was successful
            if [ ! -f "../data/${current_date}.jsonl" ]; then
                echo "⚠️ 爬取 $current_date 失败 / Crawling $current_date failed"
            else
                echo "✅ $current_date 爬取完成 / $current_date crawled successfully"
            fi
            cd ..

            # 日期加1天 / Add 1 day
            current_date=$(date -u -d "$current_date + 1 day" "+%Y-%m-%d")
        done

        echo "✅ 日期范围爬取完成 / Date range crawling completed"
        echo "crawl_date=$DATE_FROM" >> $GITHUB_OUTPUT
        echo "date_from=$DATE_FROM" >> $GITHUB_OUTPUT
        echo "date_to=$DATE_TO" >> $GITHUB_OUTPUT

    - name: Check for duplicates
      id: dedup_check
      run: |
        source .venv/bin/activate
        echo "执行去重检查... / Performing intelligent deduplication check..."
        
        cd daily_arxiv

        # 传递环境变量
        export KEYWORDS="${{ vars.KEYWORDS }}"

        echo "=== 调试信息 ==="
        echo "KEYWORDS: $KEYWORDS"
        echo "==============="

        # 执行去重检查脚本 / Execute intelligent deduplication check script
        set +e  # 暂时允许命令失败 / Temporarily allow command failure
        python daily_arxiv/check_stats.py
        
        # 获取退出码 / Get exit code
        dedup_exit_code=$?
        set -e  # 恢复严格模式 / Restore strict mode
        
        echo "去重检查退出码: $dedup_exit_code / Dedup check exit code: $dedup_exit_code"
        echo "dedup_exit_code=$dedup_exit_code" >> $GITHUB_OUTPUT
        
        case $dedup_exit_code in
            0)
                echo "has_new_content=true" >> $GITHUB_OUTPUT
                ;;
            1)
                echo "has_new_content=false" >> $GITHUB_OUTPUT
                echo "skip_reason=no_new_content" >> $GITHUB_OUTPUT
                ;;
            2)
                echo "has_new_content=false" >> $GITHUB_OUTPUT
                echo "skip_reason=processing_error" >> $GITHUB_OUTPUT
                exit 1
                ;;
            *)
                echo "❌ 未知退出码，停止工作流 / Unknown exit code, stop workflow"
                echo "has_new_content=false" >> $GITHUB_OUTPUT
                echo "skip_reason=unknown_error" >> $GITHUB_OUTPUT
                exit 1
                ;;
        esac
        
    - name: AI Enhancement Processing
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate

        # 获取日期范围
        DATE_FROM="${{ steps.crawl_step.outputs.date_from }}"
        DATE_TO="${{ steps.crawl_step.outputs.date_to }}"

        echo "开始AI增强处理... / Starting AI enhancement processing..."
        
        cd ai
        export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"
        
        # 遍历日期范围，处理每一天的数据
        current_date="$DATE_FROM"
        while [[ "$current_date" <= "$DATE_TO" ]]; do
            echo "处理日期: $current_date ..."
        
            if [ -f "../data/${current_date}.jsonl" ]; then
                python enhance.py --data ../data/${current_date}.jsonl

                if [ $? -ne 0 ]; then
                    echo "⚠️ AI处理 $current_date 失败 / AI processing $current_date failed"
                else
                    echo "✅ $current_date AI处理完成 / $current_date AI processing completed"
                fi
            else
                echo "⚠️ $current_date 数据文件不存在，跳过 / $current_date data file not found, skipping"
            fi

            # 日期加1天
            current_date=$(date -u -d "$current_date + 1 day" "+%Y-%m-%d")
        done

        echo "AI增强处理完成 / AI enhancement processing completed"
        
    - name: Convert to Markdown
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        echo "转换为Markdown格式... / Converting to Markdown format..."
        
        # 设置环境变量 / Set environment variables
        export LANGUAGE="${{ vars.LANGUAGE }}"
        
        cd to_md
        
        # 使用AI增强文件进行转换 / Use AI enhanced file for conversion
        AI_FILE="../data/${today}_AI_enhanced_${LANGUAGE}.jsonl"
        
        if [ -f "$AI_FILE" ]; then
            echo "使用AI增强文件进行转换... / Using AI enhanced file for conversion..."
            python convert.py --data "$AI_FILE"
        else
            echo "错误：未找到AI增强文件 / Error: AI enhanced file not found"
            echo "AI文件: $AI_FILE"
            exit 1
        fi
        
        # 检查转换是否成功 / Check if conversion was successful
        if [ $? -ne 0 ]; then
            echo "Markdown转换失败 / Markdown conversion failed"
            exit 1
        fi
        echo "Markdown转换完成 / Markdown conversion completed"
        
    - name: Update file list
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        echo "更新文件列表... / Updating file list..."
        ls data/*.jsonl | sed 's|data/||' > assets/file-list.txt
        echo "文件列表更新完成 / File list updated"

    - name: Generate password hash and inject into config
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        echo "🔐 Generating password hash for authentication..."

        PASSWORD="${{ secrets.ACCESS_PASSWORD }}"

        if [ -z "$PASSWORD" ]; then
          echo "⚠️  WARNING: ACCESS_PASSWORD not set in Secrets"
          echo "⚠️  Password protection will be DISABLED"
          echo "⚠️  To enable password protection, add ACCESS_PASSWORD in repository Secrets"
          echo "ℹ️  Website will remain publicly accessible without authentication"

          # Use a special value that will disable authentication
          PASSWORD_HASH="DISABLED_NO_PASSWORD_SET_IN_SECRETS"
        else
          # Generate SHA-256 hash using openssl
          PASSWORD_HASH=$(echo -n "$PASSWORD" | openssl dgst -sha256 -hex | awk '{print $2}')
          echo "✅ Password hash generated successfully"
          echo "✅ Hash length: ${#PASSWORD_HASH} characters"
          echo "🔐 Password protection is ENABLED"
        fi

        # Inject hash into auth-config.js
        if [ -f "js/auth-config.js" ]; then
          sed -i "s/PLACEHOLDER_PASSWORD_HASH/$PASSWORD_HASH/" js/auth-config.js
          echo "✅ Password hash injected into js/auth-config.js"
        else
          echo "❌ ERROR: js/auth-config.js not found!"
          exit 1
        fi

        echo "🔐 Authentication setup complete"

    - name: Summary
      run: |
        if [ "${{ steps.dedup_check.outputs.has_new_content }}" = "true" ]; then
          echo "✅ 工作流完成：去重发现新内容并成功处理 / Workflow completed: Smart deduplication found new content and processed successfully"
        else
          case "${{ steps.dedup_check.outputs.skip_reason }}" in
            "no_new_content")
              echo "ℹ️ 工作流完成：去重后无新内容 / Workflow completed: No new content after smart deduplication"
              ;;
            "processing_error")
              echo "⚠️ 工作流完成：去重处理出错 / Workflow completed: Deduplication processing error"
              ;;
            "unknown_error")
              echo "⚠️ 工作流完成：未知错误 / Workflow completed: Unknown error"
              ;;
            *)
              echo "ℹ️ 工作流完成：未知原因跳过处理 / Workflow completed: Skipped for unknown reason"
              ;;
          esac
        fi
        
    - name: Inject repository info into data-config.js
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        echo "注入仓库信息到 data-config.js... / Injecting repository info into data-config.js..."
        
        # 获取仓库信息 / Get repository information
        REPO_OWNER="${{ github.repository_owner }}"
        REPO_NAME="${{ github.event.repository.name }}"
        
        echo "仓库所有者: $REPO_OWNER / Repository owner: $REPO_OWNER"
        echo "仓库名称: $REPO_NAME / Repository name: $REPO_NAME"
        
        # 注入仓库信息到 data-config.js / Inject repository info into data-config.js
        if [ -f "js/data-config.js" ]; then
          sed -i "s/PLACEHOLDER_REPO_OWNER/$REPO_OWNER/g" js/data-config.js
          sed -i "s/PLACEHOLDER_REPO_NAME/$REPO_NAME/g" js/data-config.js
          echo "✅ 仓库信息已注入到 js/data-config.js / Repository info injected into js/data-config.js"
        else
          echo "❌ ERROR: js/data-config.js not found!"
          exit 1
        fi

    - name: Commit code changes to main branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"
        
        # 添加所有代码文件，但排除数据文件 / Add all code files, but exclude data files
        git add js/data-config.js
        git add .github/
        # 添加其他可能的代码变更，但排除 data/ 目录和 assets/file-list.txt
        # Add other possible code changes, but exclude data/ directory and assets/file-list.txt
        git add -A
        git reset -- data/* assets/file-list.txt 2>/dev/null || true
        
        # 检查是否有代码变更需要提交 / Check if there are code changes to commit
        if git diff --staged --quiet; then
          echo "没有代码变更需要提交 / No code changes to commit"
        else
          git commit -m "chore: update data-config.js with repository info"
          echo "代码变更已提交到 main 分支 / Code changes committed to main branch"
        fi

    - name: Push code changes to main branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        # 设置Git配置以处理自动合并 / Set Git config for automatic merging
        git config pull.rebase true
        git config rebase.autoStash true
        
        # 尝试推送代码变更到 main 分支 / Try to push code changes to main branch
        for i in {1..3}; do
          echo "推送代码变更尝试 $i / Push code changes attempt $i"
          if git push origin main; then
            echo "代码变更推送成功 / Code changes pushed successfully"
            break
          else
            echo "推送失败，拉取最新变更... / Push failed, pulling latest changes..."
            git pull origin main --no-edit || true
            if [ $i -eq 3 ]; then
              echo "3次尝试后推送失败 / Failed to push after 3 attempts"
              exit 1
            fi
          fi
        done

    - name: Prepare data files for data branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        echo "准备数据文件... / Preparing data files..."
        today=${{ steps.crawl_step.outputs.crawl_date }}
        
        # 创建临时目录保存数据文件 / Create temporary directory to save data files
        mkdir -p /tmp/data_files/data
        mkdir -p /tmp/data_files/assets
        
        # 复制数据文件到临时目录 / Copy data files to temporary directory
        cp -r data/* /tmp/data_files/data/ 2>/dev/null || true
        cp assets/file-list.txt /tmp/data_files/assets/ 2>/dev/null || true
        
        echo "数据文件已保存到临时目录 / Data files saved to temporary directory"

    - name: Setup and commit to data branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"
        
        echo "设置 data 分支... / Setting up data branch..."
        today=${{ steps.crawl_step.outputs.crawl_date }}
        
        # 在切换分支前，清理工作目录中可能冲突的未跟踪文件
        # Before switching branches, clean untracked files that might conflict
        # 这些文件已经保存到临时目录，所以可以安全删除
        # These files are already saved to temporary directory, so safe to remove
        rm -rf data/*.jsonl 2>/dev/null || true
        rm -f assets/file-list.txt 2>/dev/null || true
        rm -f data/*.md 2>/dev/null || true
        
        # 检查 data 分支是否存在 / Check if data branch exists
        if git ls-remote --heads origin data | grep -q data; then
          echo "data 分支已存在，切换到 data 分支 / Data branch exists, switching to data branch"
          git fetch origin data:data
          git checkout data
          git pull origin data || true
        else
          echo "data 分支不存在，创建新分支 / Data branch does not exist, creating new branch"
          # 创建空的 data 分支 / Create empty data branch
          git checkout --orphan data
          git rm -rf --cached . 2>/dev/null || true
          # 确保 data 和 assets 目录存在 / Ensure data and assets directories exist
          mkdir -p data assets
          echo "# Data Branch" > README.md
          git add README.md
          git commit -m "chore: initialize data branch"
          git push origin data
        fi
        
        # 从临时目录恢复数据文件 / Restore data files from temporary directory
        # 确保目录存在 / Ensure directories exist
        mkdir -p data assets
        cp -r /tmp/data_files/data/* data/ 2>/dev/null || true
        cp /tmp/data_files/assets/file-list.txt assets/ 2>/dev/null || true
        
        # 只添加数据文件 / Only add data files
        git add data/* 2>/dev/null || true
        git add assets/file-list.txt 2>/dev/null || true
        
        # 检查是否有数据变更需要提交 / Check if there are data changes to commit
        if git diff --staged --quiet; then
          echo "没有数据变更需要提交 / No data changes to commit"
        else
          git commit -m "update: $today arXiv papers"
          echo "数据变更已提交到 data 分支 / Data changes committed to data branch"
        fi

    - name: Push data changes to data branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        # 设置Git配置以处理自动合并 / Set Git config for automatic merging
        git config pull.rebase true
        git config rebase.autoStash true
        
        # 尝试推送数据变更到 data 分支 / Try to push data changes to data branch
        for i in {1..3}; do
          echo "推送数据变更尝试 $i / Push data changes attempt $i"
          if git push origin data; then
            echo "数据变更推送成功 / Data changes pushed successfully"
            break
          else
            echo "推送失败，拉取最新变更... / Push failed, pulling latest changes..."
            git pull origin data --no-edit || true
            if [ $i -eq 3 ]; then
              echo "3次尝试后推送失败 / Failed to push after 3 attempts"
              exit 1
            fi
          fi
        done
